services:
  - type: web
    name: humblelegend-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.7
      - key: DATABASE_URL
        value: sqlite:///./humblelegend.db
      - key: LOG_LEVEL
        value: INFO
